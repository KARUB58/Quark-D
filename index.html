<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pen & 3D Hand Mesh</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; transform: scaleX(-1); }
        .input_video { display: none; }

        .ui-panel {
            position: absolute; z-index: 100;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 20px;
        }
        #info-box { top: 20px; left: 20px; pointer-events: none; }
        .pen-tip { width: 10px; height: 10px; background: white; border-radius: 50%; position: absolute; display: none; z-index: 1000; box-shadow: 0 0 10px white; }
    </style>
</head>
<body>

    <div id="info-box" class="ui-panel">
        <h3 style="margin:0">🖋️ Kalem Modu Aktif</h3>
        <p style="font-size: 13px; opacity: 0.8;">
            Kalemi elinle tut, yapay zeka kalem ucunu takip edecek.<br>
            <b>Çizmek için:</b> Kalemle havada hareket et.
        </p>
    </div>

    <div id="pen-cursor" class="pen-tip"></div>

    <video class="input_video"></video>
    <canvas class="output_canvas"></canvas>

    <script>
        const videoElement = document.querySelector('.input_video');
        const canvasElement = document.querySelector('.output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const cursor = document.getElementById('pen-cursor');

        let drawings = [];
        let currentPath = null;
        let activeColor = '#00ffcc';
        
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;

        function draw3DMesh(landmarks) {
            // El üzerindeki yoğun nokta bulutu
            landmarks.forEach((pt, i) => {
                const x = pt.x * canvasElement.width;
                const y = pt.y * canvasElement.height;
                // Noktalar elin derinliğine göre parlasın
                const size = 2 + (pt.z * -10);
                canvasCtx.fillStyle = `rgba(0, 255, 204, ${0.5 + (pt.z * -2)})`;
                canvasCtx.beginPath();
                canvasCtx.arc(x, y, Math.max(1, size), 0, Math.PI * 2);
                canvasCtx.fill();
            });
        }

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                
                // 3D Ağımızı çiz
                draw3DMesh(hand);

                // Kalem ucu (İşaret parmağı ucu)
                const indexTip = hand[8];
                const x = (1 - indexTip.x) * canvasElement.width; // Ayna yansıması düzeltildi
                const y = indexTip.y * canvasElement.height;

                // Kalem imlecini güncelle
                cursor.style.display = 'block';
                cursor.style.left = `${x}px`;
                cursor.style.top = `${y}px`;

                // Kalemle Çizim (Sürekli mod - kalem tutuşunu algılar)
                if (!currentPath) {
                    currentPath = { pts: [], color: activeColor };
                    drawings.push(currentPath);
                }
                currentPath.pts.push({x, y});
            } else {
                cursor.style.display = 'none';
                currentPath = null;
            }

            // Çizimleri render et
            drawings.forEach(d => {
                if (d.pts.length < 2) return;
                canvasCtx.beginPath();
                canvasCtx.strokeStyle = d.color;
                canvasCtx.lineWidth = 4;
                canvasCtx.lineCap = 'round';
                canvasCtx.shadowBlur = 10;
                canvasCtx.shadowColor = d.color;
                canvasCtx.moveTo(d.pts[0].x, d.pts[0].y);
                for (let i = 1; i < d.pts.length; i++) {
                    canvasCtx.lineTo(d.pts[i].x, d.pts[i].y);
                }
                canvasCtx.stroke();
            });

            canvasCtx.restore();
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.85 });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
